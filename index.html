<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FamilyChores" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Gestion des tâches ménagères en famille" />
    <title>FamilyChores</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; -webkit-overflow-scrolling: touch; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { background: #f5f5f7; overflow-x: hidden; }
      #root { height: 100%; min-height: 100vh; }
      input, button, select, textarea { font-family: inherit; outline: none; -webkit-appearance: none; }
      button:active { transform: scale(0.97); }
      select { appearance: none; -webkit-appearance: none; }
      button { user-select: none; -webkit-user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "65de1f8b-1d6e-46f6-be4e-36b5f6c7f631",
          notifyButton: { enable: false },
          promptOptions: { slidedown: { prompts: [{ type: "push", autoPrompt: true, text: { actionMessage: "FamilyChores souhaite vous envoyer des notifications", acceptButton: "Autoriser", cancelButton: "Plus tard" } }] } }
        });
      });
    </script>
  </body>
</html>
